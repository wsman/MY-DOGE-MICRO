# Technical Requirement ID Registry
#
# PURPOSE: Persistent, stable IDs for every CDD technical requirement.
# Prevents TR-ID renumbering across /architecture-review runs, which would
# break story references.
#
# RULES:
#   - IDs are PERMANENT. Never renumber, never delete (use status: deprecated).
#   - Add new entries only at the END of each system's list.
#   - When a CDD requirement is reworded (same intent): update `requirement`
#     text and add a `revised` date. The ID stays the same.
#   - When a requirement is removed from the CDD: set status: deprecated.
#   - When a requirement is split or replaced: set status: superseded-by with
#     the new TR-ID(s).
#
# WRITTEN BY: /architecture-review (appends new entries, never overwrites)
# READ BY:    /create-stories (embed IDs in stories)
#             /story-done (look up current requirement text at review time)
#             /story-readiness (validate TR-ID exists and is active)
#
# ID FORMAT: TR-[NNN]
#   NNN = three-digit zero-padded sequence across the WHOLE project (one
#   flat namespace), starting at 001. `system` carries the CDD slug for
#   grouping. This flat form matches the brief ("TR-001..TR-0NN") and the
#   docs/CLAUDE.md example (TR-MOV-001 is per-system in game projects; this
#   product uses a single flat TR-NNN stream keyed by CDD system).
#
# STATUS VALUES: active | deprecated | superseded-by: TR-NNN
#
# Each entry maps:
#   id          -> stable requirement ID
#   system      -> CDD slug (design/cdd/<slug>.md)
#   cdd         -> source CDD path
#   section     -> CDD section carrying the requirement
#   requirement -> load-bearing requirement / acceptance criterion text
#   adr         -> governing ADR (docs/architecture/adr-NNNN-*.md)
#   test        -> verifying test file (relative path)
#   created     -> date the TR was first minted
#   revised     -> last text-revision date (empty if never)
#   status      -> active | deprecated | superseded-by: TR-NNN

