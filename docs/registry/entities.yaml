# MY-DOGE-MICRO — Canonical Entities Catalog
#
# PURPOSE: Single source of truth for formulas, constants, and named entities
# (DuckDB views, MCP tools, API routes, services, ports, tables) across the 20
# product modules. Aggregated from the "Registry Proposals" / Contracts /
# Configuration-Knobs sections of the CDDs (design/cdd/*.md) and reconciled
# against the ADR registry (docs/architecture/adr-0001..0015).
#
# RULES:
#   - Each canonical value appears EXACTLY ONCE. Duplicate proposals across CDDs
#     (e.g. RSRS window, TDX ports, retention) are collapsed to a single entry
#     that cites the owning module's file:line plus the cross-references.
#   - `owner` is the module slug that owns the value (per module-index.md).
#   - `source` is the canonical file:line. `also_at` lists parallel copies that
#     must stay aligned (lockstep invariants).
#   - NEVER delete entries; set status: superseded instead.
#   - This file holds concrete VALUES. Cross-ADR architectural stances live in
#     docs/registry/architecture.yaml (the two files are complementary).
#
# WRITTEN BY: Phase-5 set-approval (BLOCKING — user must approve before write)
# READ BY:    /dev-story, /story-done, /architecture-review, code review
#
# STATUS VALUES: active | superseded

version: 1
last_updated: "2026-06-22"

# ============================================================================
# FORMULAS — quantitative / algorithmic formulas with variables and ranges
# ============================================================================
formulas:

  - name: rsrs
    status: active
    formula: "RSRS(series, window) = R_squared * sign(slope)"
    expansion: "(r_value^2) * sign(slope_of_y_on_time)  via scipy.stats.linregress(x, y)"
    range: "[-1.0, 1.0]"
    variables:
      series: "pandas.Series of prices (daily close), time-ordered ascending"
      window: "int, default 18 — regression lookback; only the last `window` bars used"
      y: "series.iloc[-window:].values"
      x: "np.arange(len(y))"
      slope: "OLS slope from scipy.stats.linregress"
      r_value: "Pearson r from linregress (nan when y has zero variance)"
      R_squared: "float(r_value) ** 2, range [0,1]"
      sign: "1.0 if float(slope) > 0 else -1.0"
    guards:
      - "len(series) < window -> return 0.0"
      - "np.var(y) <= 1e-10 (flat/zero variance) -> return 0.0  [BUG-E fix]"
      - "any Exception -> return 0.0"
      - "residual nan (x != x test) -> return 0.0"
    equivalence_invariant: "calculate_rsrs (scalar) and _calculate_rsrs_vectorized agree to < 1e-6 on identical input"
    owner: micro-momentum-scanner
    source: "src/micro/momentum_scanner.py:47-71"
    also_at:
      - "DuckDB view: data/views.sql:114-122 (vw_rsrs_ranking_cn/us; sign convention differs — see conflicts)"
      - "macro local copy: src/macro/data_loader.py:167-193 (DRIFTS — missing flat-variance + NaN guards; reconciliation TR-016)"
      - "default window mirrored at: src/doge/config/settings.py:60 (MarketConfig.rsrs_window)"
    notes: "Canonical RSRS. Module #4's local macro copy must be reconciled to delegate or replicate both guards before this stance is load-bearing across modules."

  - name: vol_skew
    status: active
    formula: "VolSkew(prices) = std(short_window_returns) / std(long_window_returns)"
    range: "[0, +inf); returns 1.0 when long-window std is 0 or NaN"
    variables:
      short_window: "int, default 5"
      long_window: "int, default 20"
    owner: macro-strategy-engine
    source: "src/macro/data_loader.py:195-206"
    notes: "Macro dashboard indicator. Interpretation bands (prompt-hardcoded): <0.8 low, 0.8..1.5 normal, >1.5 elevated."

  - name: annualized_log_return_volatility
    status: active
    formula: "ann_vol = std(log_returns) * sqrt(252)"
    owner: macro-strategy-engine
    source: "src/macro/data_loader.py:208-265"
    notes: "Used for tech_volatility and vol_scale_factor = 1/ann_vol."

  - name: change_percent_60d
    status: active
    formula: "change_pct = (close_now - close_60d_ago) / close_60d_ago * 100"
    guard: "skip when close_60d_ago == 0 (avoid divide-by-zero)"
    owner: micro-momentum-scanner
    source: "src/micro/momentum_scanner.py:225-232"

  - name: volume_ratio
    status: active
    formula: "vol_ratio = day_volume / avg_vol_20d"
    owner: market-data-storage
    source: "data/views.sql:142-173 (vw_volume_anomalies_cn)"
    notes: "Surface rows where vol_ratio >= 2.0 in the view; MCP/API default threshold 3.0."

  - name: gold_btc_ratio_zscore
    status: active
    formula: "ratio = GLD_close / BTC_close; ratio_z = (ratio - mean(ratio)) / std(ratio) over rolling window"
    owner: macro-strategy-engine
    source: "src/macro/data_loader.py:208-265"

