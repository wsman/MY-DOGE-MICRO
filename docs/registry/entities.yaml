      - {name: research_reports, owner: market-data-storage, source: "src/micro/database.py:267-277", columns: "id, date, timestamp, tags, analyst, title, content"}
      - {name: insights, owner: market-data-storage, source: "src/micro/database.py:58-67", columns: "id, created_at, category, target, summary, full_content"}
      - {name: knowledge_entities, owner: market-data-storage, source: "src/micro/database.py:70-76", columns: "id, name (UNIQUE), entity_type"}
      - {name: knowledge_graph, owner: market-data-storage, source: "src/micro/database.py:79-88", columns: "id, source, target, relation, insight_id (FK->insights ON DELETE CASCADE)"}
      - {name: stock_notes, owner: research-insight-knowledge-base, source: "src/ai_analysis/stock_notes.py:29-49", columns: "id (PK AUTOINCREMENT), ticker, market, created_at, note_type, title, content, tags, price_at_note, source, deleted_at (soft-delete)"}
