  # readers and /architecture-review can reconcile the two naming conventions.
  adr0001_port_aliases:
    - {adr0001_name: StockRepository, source_abc: IStockRepository}
    - {adr0001_name: ReportRepository, source_abc: IReportRepository}
    - {adr0001_name: MarketDataSource, source_abc: IMarketDataSource}
    - {adr0001_name: TickerMetadataSource, source_abc: ITickerMetadataSource, notes: "remote yfinance .info name+sector (ADR-0009 split)"}
    - {adr0001_name: Cache, source_abc: ITickerNameCache, notes: "local-JSON ticker-name lookup (ADR-0009 split; == ADR-0003 proposed ICache)"}

  # --- Ports (5 TCP) ---
  network_ports:
    - {port: 7709, protocol: TDX, market: cn, owner: runtime-configuration}
    - {port: 7727, protocol: TDX, market: us, owner: runtime-configuration}
    - {port: 8901, protocol: HTTP/FastAPI, owner: fastapi-service, notes: "127.0.0.1 bind"}
    - {port: 8902, protocol: MCP SSE / HTTP, owner: mcp-server, notes: "127.0.0.1 default"}
    - {port: 1234, protocol: HTTP, owner: macro-strategy-engine, notes: "LM Studio local base_url http://localhost:1234/v1 (optional OpenAI-compatible profile)"}

