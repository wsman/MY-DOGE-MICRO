    - name: vw_daily_enriched_cn
      rows: 600690
      columns: "ticker, date, open, high, low, close, volume, amount, return_pct, ma_5, ma_10, ma_20, ma_60, atr_14, ma60_deviation, volatility_20d"
      owner: market-data-storage
      source: "data/views.sql:202-253"
      notes: "365-day window. Consumed by query_stock (CN), data kline."
    - name: vw_rsrs_ranking_cn
      rows: 200
      columns: "ticker, last_close, close_60d_ago, pct_change_60d, avg_vol_20d, avg_amt_60d_wan, rsrs, rsrs_points, rank"
      owner: market-data-storage
      source: "data/views.sql:62-137"
      notes: "180-day window; CN whitelist; top 200 by pct_change_60d; rsrs via REGR_R2*sign over 18 bars."
    - name: vw_rsrs_ranking_us
      rows: 200
      owner: market-data-storage
      source: "data/views.sql (US variant)"
      notes: "180-day window."
    - name: vw_market_breadth_cn
      rows: 118
      columns: "date, advancers, decliners, unchanged, active, avg_return_pct, std_return_pct, advance_ratio"
      owner: market-data-storage
      source: "data/views.sql:23"
      notes: "730-day window — LONGEST view horizon (latent retention bug)."
    - name: vw_market_breadth_us
      rows: 122
      owner: market-data-storage
      source: "data/views.sql:266"
      notes: "365-day window; no advance_ratio column."
    - name: vw_volume_anomalies_cn
      rows: 40555
      columns: "ticker, date, volume, avg_vol_20d, vol_ratio, intraday_return"
      owner: market-data-storage
      source: "data/views.sql:142-173"
      notes: "vol_ratio >= 2.0; from 2025-01-01."
    - name: vw_cross_sectional_return_cn
      rows: 600690
      columns: "ticker, date, return_pct, volume, close"
      owner: market-data-storage
      source: "data/views.sql"
      notes: "365-day window."
    - name: temp_vol_check
      rows: 279652
      columns: "ticker, date, volume, avg_vol, vol_ratio"
      owner: market-data-storage
      source: "(ad-hoc; not in data/views.sql — open question Module #2 §9 #9)"

