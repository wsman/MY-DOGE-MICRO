# OpenDoge — Architecture Stance Registry
#
# PURPOSE: Single source of truth for cross-ADR architectural stances that all
# ADRs must agree on. Skills check this before writing new ADRs to detect
# conflicts at authoring time. Aggregated from ADR-0001..0024 and module CDDs.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#   - Never delete entries — set status: superseded_by: ADR-NNNN.
#   - `adr` is the authoritative source; dependent ADRs list themselves in
#     referenced_by[].
#   - This file holds STANCES (port contracts, layer rules, forbidden patterns,
#     API decisions, performance budgets). Concrete VALUES live in
#     docs/registry/entities.yaml.
#
# WRITTEN BY: Phase-5 set-approval (BLOCKING — user must approve before write)
# READ BY:    /architecture-decision, /architecture-review, /create-stories,
#             /dev-story
#
# STATUS VALUES: active | superseded_by: ADR-NNNN

version: 1
last_updated: "2026-07-09"

