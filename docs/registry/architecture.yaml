# ============================================================================
# FORBIDDEN PATTERNS — explicitly banned by ADR-0001
# ============================================================================
forbidden_patterns:
  - pattern: direct_sqlite_import_in_interface
    status: active
    description: "No file under src/api/, src/doge/interfaces/, src/interface/, or the MCP/web layers may import sqlite3 or call sqlite3.connect(). All storage access via IStockRepository / IReportRepository."
    why: "Direct SQLite access in interfaces duplicates connection logic, bypasses retention/error contracts, and makes the layer untestable in isolation."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/doge/interfaces/api/routers/data.py, src/doge/interfaces/api/routers/scan.py (init_db_custom), src/doge/interfaces/api/routers/notes.py (lazy stock_notes import)"
    added: "2026-06-12"

  - pattern: direct_duckdb_connect_in_interface
    status: active
    description: "No interface module may import duckdb or call duckdb.connect / connect_duckdb. Use DuckDBConnection adapter."
    why: "Same as above for the analytical-read layer; preserves zero-copy read-only contract."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/doge/interfaces/api/routers/scan.py, src/ai_analysis/__init__.py:97-114 (legacy connect_duckdb)"
    added: "2026-06-12"

  - pattern: sys_path_insert
    status: active
    description: "No module under src/** and no root runtime entrypoint may call sys.path.insert/append for bootstrapping. The doge_mcp.py canonical entrypoint contains no shim."
    why: "sys.path mutation creates hidden import dependencies, breaks test isolation, and fails across alternative launchers (MCP stdio vs SSE vs uvicorn vs PyQt)."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    referenced_by:
      - docs/architecture/adr-0002-centralized-configuration.md
    current_offenders: "src/micro/{tdx_downloader,market_scanner,industry_analyzer}.py, all src/doge/interfaces/api/routers/*.py, src/cli.py, src/macro/cli.py, src/interface/scanner_gui.py, src/ai_analysis/*.py"
    added: "2026-06-12"

  - pattern: _PROJECT_ROOT_recalculation
    status: active
    description: "No module may recompute _PROJECT_ROOT via Path(__file__).parents[N] or os.path.dirname chains. Single source: src/doge/config/settings.py:15 (parents[3])."
    why: "Per-file root recalculation causes path drift when the tree is restructured and silent disagreement about where data lives."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    referenced_by:
      - docs/architecture/adr-0002-centralized-configuration.md
    current_offenders: "7+ legacy occurrences: tdx_downloader.py:23, market_scanner.py:24, all 5 api/routers/*.py, api/main.py:9, ai_analysis/__init__.py:21"
    added: "2026-06-12"

  - pattern: cross_layer_state_write
    status: active
    description: "A module must never write state owned by another layer. Interface modules must not mutate shared module-level DB globals or process env (HTTP_PROXY/HTTPS_PROXY/DEEPSEEK_*) except behind a documented boundary."
    why: "Cross-layer writes create race conditions, hidden global side effects, and break the state ownership model."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/micro/industry_analyzer.py:50-51 (HTTP_PROXY), src/macro/data_loader.py:56-147, src/interface/analysis_gui.py:31-32 (DEEPSEEK_*), BLAS thread shims in 3 modules"
    added: "2026-06-12"

  - pattern: direct_backend_import_in_presentation
    status: active
    description: "Presentation-layer modules (src/interface/*, web) must not import src/macro.*, src.micro.*, or src.ai_analysis directly; route through services/ports."
    why: "Tight coupling to backend modules makes the UI untestable and bypasses the clean-architecture boundary."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/interface/scanner_gui.py:26-28, src/interface/analysis_gui.py:15"
    added: "2026-06-12"

  - pattern: swallowed_storage_exception
    status: active
    description: "Bare `except Exception: pass` in storage write paths is forbidden. Use typed StorageWriteError or structured result."
    why: "Silent write-failure swallowing causes silent data loss (save_stock_data_custom database.py:152-153)."
    adr: docs/architecture/adr-0003-storage-repository-contract.md
    current_offenders: "src/micro/database.py:152-153"
    added: "2026-06-12"

  - pattern: committed_secret
    status: active
    description: "No real API key/credential may be committed. models_config.json must ship a placeholder and be gitignored."
    why: "Secrets in source control violate the no-secrets rule and expose operator credentials."
    adr: docs/architecture/adr-0005-llm-client-strategy.md
    current_offenders: "models_config.json ships a real-looking api_key (open remediation)"
    added: "2026-06-12"

  - pattern: runtime_platform_context_columns_without_adr
    status: active
    description: "Do not add nullable workspace_id, project_id, case_id, or template_id columns to runtime/evidence tables for optional platform organization without a follow-up ADR."
    why: "Association tables keep platform organization decoupled from runtime and evidence table migrations."
    adr: docs/architecture/adr-0016-user-level-objects.md
    current_offenders: "None known"
    added: "2026-06-22"

  - pattern: client_side_citation_authority
    status: active
    description: "Web or SDK clients must not be the source of truth for claim support, citation ACL, or run eval status."
    why: "Citation support and tenant ACL must be computed server-side from local provenance."
    adr: docs/architecture/adr-0017-run-summary-citation-api.md
    current_offenders: "Existing CitationDrilldown.vue and CostEvalPanel.vue reconstruct from artifacts/events as fallback until formal APIs land."
    added: "2026-06-22"

# ============================================================================
# API DECISIONS — non-obvious framework/library choices
# ============================================================================
api_decisions:
  - purpose: web_framework
    status: active
    api: FastAPI 0.123.8
    not: "Flask, Django (heavier; less async-native for SSE)"
    adr: docs/architecture/adr-0007-api-surface-and-cors.md
    reason: "Async-native, Pydantic v2 validation, OpenAPI surface for the web console."
    added: "2026-06-12"

  - purpose: mcp_transport
    status: active
    api: "mcp 1.25.0 FastMCP — dual transport: stdio (primary, Claude Code) + SSE (secondary, web/remote)"
    not: "HTTP-only single transport; gRPC"
    adr: docs/architecture/adr-0006-mcp-transport-strategy.md
    reason: "stdio is the MCP-canonical local integration; SSE serves the browser liveness probe and remote clients from one server."
    added: "2026-06-12"

  - purpose: analytical_read_engine
    status: active
    api: "DuckDB 1.4.4 zero-copy read-over-SQLite (sqlite extension ATTACH read-only)"
    not: "Duplicate OHLCV into DuckDB tables; replace SQLite with DuckDB as sole store"
    adr: docs/architecture/adr-0003-storage-repository-contract.md
    reason: "Preserves SQLite WAL single-writer semantics for ingestion; DuckDB adds rich analytical SQL without data duplication."
    added: "2026-06-12"

  - purpose: llm_client
    status: active
    api: "openai SDK 1.62.0 in OpenAI-compatible mode (single DeepSeekStrategist)"
    not: "Per-module LLM clients; langchain; direct HTTP"
    adr: docs/architecture/adr-0005-llm-client-strategy.md
    reason: "One client surface; provider/model/base_url switchable via models_config.json or DEEPSEEK_* env (no source edit). DeepSeek, DeepSeek Reasoner, local LM Studio all supported."
    added: "2026-06-12"

  - purpose: cors_policy
    status: active
    api: "allow_origins=['*'], allow_methods=['*'], allow_headers=['*']"
    not: "Tight origin allowlist (today)"
    adr: docs/architecture/adr-0007-api-surface-and-cors.md
    reason: "Safe ONLY because FastAPI binds 127.0.0.1. Hardening target: explicit localhost origins once non-loopback bind is contemplated."
    referenced_by:
      - docs/architecture/adr-0008-web-architecture.md
    added: "2026-06-12"

  - purpose: market_data_source
    status: active
    api: "TDX (opentdx protocol, primary) + yfinance 0.2.66 (secondary/fallback), both via IMarketDataSource adapter"
    not: "Direct yfinance.download in modules (legacy macro/data_loader.py drift)"
    adr: docs/architecture/adr-0004-data-source-adapter-contract.md
    reason: "Shared retry/backoff, canonical 8-col frame, offline-tolerant (return None, never crash)."
    added: "2026-06-12"

  - purpose: web_stack
    status: active
    api: "Vue 3.5 + Vite 8 + Pinia 3 + Naive UI 2.44 + lightweight-charts v5 + manual-fetch SSE (NOT EventSource)"
    not: "React; EventSource (endpoint is POST)"
    adr: docs/architecture/adr-0008-web-architecture.md
    reason: "Composition API + virtual scroll + manual SSE for POST scan endpoint."
    added: "2026-06-12"

  - purpose: config_centralization
    status: active
    api: "frozen dataclass Settings in src/doge/config/settings.py + get_settings() lazy singleton"
    not: "pydantic-settings / dynaconf; per-module root recalculation; YAML/TOML config file as primary"
    adr: docs/architecture/adr-0002-centralized-configuration.md
    reason: "Stdlib-only for the Foundation layer; env-var override is the operator contract; frozen=True prevents mid-process mutation."
    added: "2026-06-12"

  - purpose: sse_reader
    status: active
    api: "raw fetch + ReadableStream reader (web console)"
    not: EventSource
    adr: docs/architecture/adr-0008-web-architecture.md
    reason: "Scan endpoint is POST /api/scan/{market}; EventSource only supports GET. progress===-1 error, >=100 complete."
    added: "2026-06-12"

  - purpose: platform_shell_routing
    status: active
    api: "Vue Router feature-flagged platform shell; preserve direct /research-agent route"
    not: "Immediate replacement of /research-agent"
    adr: docs/architecture/adr-0020-platform-shell-ui.md
    reason: "Platform workflows need shared navigation and context while existing agent route compatibility remains required."
    added: "2026-06-22"

  - purpose: run_summary_discovery
    status: active
    api: "FastAPI /v1/runs/{run_id}/{summary,claims,citations,eval}"
    not: "Client-only reconstruction from event/artifact arrays as the authoritative contract"
    adr: docs/architecture/adr-0017-run-summary-citation-api.md
    reason: "Server-side summaries preserve ACL checks, local evidence provenance, and SDK/UI parity."
    added: "2026-06-22"

  - purpose: capability_discovery
    status: active
    api: "FastAPI /v1/capabilities via redacted registry facade"
    not: "Frontend environment flags as the only capability source"
    adr: docs/architecture/adr-0019-capability-registry.md
    reason: "Workflows and shell routes need provider/tool/evidence/maturity blockers from one safe source."
    added: "2026-06-22"

# ============================================================================
# PERFORMANCE BUDGETS
# ============================================================================
performance_budgets:
  - budget: mcp_tool_latency
    target: "< 30s per tool call"
    platform: local
    adr: docs/architecture/adr-0006-mcp-transport-strategy.md
    enforced_by: "_timed decorator (asyncio.wait_for, TOOL_TIMEOUT=30); on timeout returns 'Error: {tool} timed out after 30s'"
    notes: "Matches standards/technical-preferences.md MCP Tool Latency budget."
    added: "2026-06-12"

  - budget: api_route_latency
    target: "no operator-perceived regression vs direct-DB baseline"
    platform: local
    adr: docs/architecture/adr-0007-api-surface-and-cors.md
    notes: "Read routes open fresh sqlite3 connection per handler today (no pooling). Target: repository-routed, WAL-enabled."
    added: "2026-06-12"

  - budget: duckdb_analytical_reads
    target: "zero-copy reads over SQLite; memory bounded by result set"
    platform: local
    adr: docs/architecture/adr-0003-storage-repository-contract.md
    enforced_by: "DuckDBConnection read_only=True; threads=4; OPENBLAS_NUM_THREADS=1 / OMP_NUM_THREADS=1 to bound pandas conversion memory"
    added: "2026-06-12"

  - budget: ui_responsiveness
    target: "long-running scans/macro/LLM runs never freeze the UI thread"
    platform: "local desktop (PyQt) + browser (Vue)"
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    enforced_by: "PyQt QThread workers + Qt signals; Vue web worker + SSE stream; scan auto-locks DB editor tab"
    added: "2026-06-12"

  - budget: memory_ceiling
    target: "bounded by dataset size; avoid full-history UI loads"
    platform: local
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    enforced_by: "120-day fetch default per ticker; virtual scroll (viewport + buffer rows only); DuckDB view result sets"
    added: "2026-06-12"

