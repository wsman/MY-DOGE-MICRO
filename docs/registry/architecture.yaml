# ============================================================================
# FORBIDDEN PATTERNS — explicitly banned by ADR-0001
# ============================================================================
forbidden_patterns:
  - pattern: direct_sqlite_import_in_interface
    status: active
    description: "No file under src/api/, src/doge/interfaces/, src/interface/, or the MCP/web layers may import sqlite3 or call sqlite3.connect(). All storage access via IStockRepository / IReportRepository."
    why: "Direct SQLite access in interfaces duplicates connection logic, bypasses retention/error contracts, and makes the layer untestable in isolation."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/doge/interfaces/api/routers/data.py, src/doge/interfaces/api/routers/scan.py (init_db_custom), src/doge/interfaces/api/routers/notes.py (lazy stock_notes import)"
    added: "2026-06-12"

  - pattern: direct_duckdb_connect_in_interface
    status: active
    description: "No interface module may import duckdb or call duckdb.connect / connect_duckdb. Use DuckDBConnection adapter."
    why: "Same as above for the analytical-read layer; preserves zero-copy read-only contract."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/doge/interfaces/api/routers/scan.py, src/ai_analysis/__init__.py:97-114 (legacy connect_duckdb)"
    added: "2026-06-12"

  - pattern: sys_path_insert
    status: active
    description: "No module under src/** and no root runtime entrypoint may call sys.path.insert/append for bootstrapping. The doge_mcp.py canonical entrypoint contains no shim."
    why: "sys.path mutation creates hidden import dependencies, breaks test isolation, and fails across alternative launchers (MCP stdio vs SSE vs uvicorn vs PyQt)."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    referenced_by:
      - docs/architecture/adr-0002-centralized-configuration.md
    current_offenders: "src/micro/{tdx_downloader,market_scanner,industry_analyzer}.py, all src/doge/interfaces/api/routers/*.py, src/cli.py, src/macro/cli.py, src/interface/scanner_gui.py, src/ai_analysis/*.py"
    added: "2026-06-12"

  - pattern: _PROJECT_ROOT_recalculation
    status: active
    description: "No module may recompute _PROJECT_ROOT via Path(__file__).parents[N] or os.path.dirname chains. Single source: src/doge/config/settings.py:15 (parents[3])."
    why: "Per-file root recalculation causes path drift when the tree is restructured and silent disagreement about where data lives."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    referenced_by:
      - docs/architecture/adr-0002-centralized-configuration.md
    current_offenders: "7+ legacy occurrences: tdx_downloader.py:23, market_scanner.py:24, all 5 api/routers/*.py, api/main.py:9, ai_analysis/__init__.py:21"
    added: "2026-06-12"

  - pattern: cross_layer_state_write
    status: active
    description: "A module must never write state owned by another layer. Interface modules must not mutate shared module-level DB globals or process env (HTTP_PROXY/HTTPS_PROXY/DEEPSEEK_*) except behind a documented boundary."
    why: "Cross-layer writes create race conditions, hidden global side effects, and break the state ownership model."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/micro/industry_analyzer.py:50-51 (HTTP_PROXY), src/macro/data_loader.py:56-147, src/interface/analysis_gui.py:31-32 (DEEPSEEK_*), BLAS thread shims in 3 modules"
    added: "2026-06-12"

  - pattern: direct_backend_import_in_presentation
    status: active
    description: "Presentation-layer modules (src/interface/*, web) must not import src/macro.*, src.micro.*, or src.ai_analysis directly; route through services/ports."
    why: "Tight coupling to backend modules makes the UI untestable and bypasses the clean-architecture boundary."
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    current_offenders: "src/interface/scanner_gui.py:26-28, src/interface/analysis_gui.py:15"
    added: "2026-06-12"

  - pattern: swallowed_storage_exception
    status: active
    description: "Bare `except Exception: pass` in storage write paths is forbidden. Use typed StorageWriteError or structured result."
    why: "Silent write-failure swallowing causes silent data loss (save_stock_data_custom database.py:152-153)."
    adr: docs/architecture/adr-0003-storage-repository-contract.md
    current_offenders: "src/micro/database.py:152-153"
    added: "2026-06-12"

  - pattern: committed_secret
    status: active
    description: "No real API key/credential may be committed. models_config.json must ship a placeholder and be gitignored."
    why: "Secrets in source control violate the no-secrets rule and expose operator credentials."
    adr: docs/architecture/adr-0005-llm-client-strategy.md
    current_offenders: "models_config.json ships a real-looking api_key (open remediation)"
    added: "2026-06-12"

  - pattern: runtime_platform_context_columns_without_adr
    status: active
    description: "Do not add nullable workspace_id, project_id, case_id, or template_id columns to runtime/evidence tables for optional platform organization without a follow-up ADR."
    why: "Association tables keep platform organization decoupled from runtime and evidence table migrations."
    adr: docs/architecture/adr-0016-user-level-objects.md
    current_offenders: "None known"
    added: "2026-06-22"

  - pattern: client_side_citation_authority
    status: active
    description: "Web or SDK clients must not be the source of truth for claim support, citation ACL, or run eval status."
    why: "Citation support and tenant ACL must be computed server-side from local provenance."
    adr: docs/architecture/adr-0017-run-summary-citation-api.md
    current_offenders: "Existing CitationDrilldown.vue and CostEvalPanel.vue reconstruct from artifacts/events as fallback until formal APIs land."
    added: "2026-06-22"

# ============================================================================
# API DECISIONS — non-obvious framework/library choices
# ============================================================================
api_decisions:
  - purpose: web_framework
    status: active
    api: FastAPI 0.123.8
    not: "Flask, Django (heavier; less async-native for SSE)"
    adr: docs/architecture/adr-0007-api-surface-and-cors.md
    reason: "Async-native, Pydantic v2 validation, OpenAPI surface for the web console."
    added: "2026-06-12"

  - purpose: mcp_transport
    status: active
    api: "mcp 1.25.0 FastMCP — dual transport: stdio (primary, Claude Code) + SSE (secondary, web/remote)"
    not: "HTTP-only single transport; gRPC"
    adr: docs/architecture/adr-0006-mcp-transport-strategy.md
    reason: "stdio is the MCP-canonical local integration; SSE serves the browser liveness probe and remote clients from one server."
    added: "2026-06-12"

  - purpose: analytical_read_engine
    status: active
    api: "DuckDB 1.4.4 zero-copy read-over-SQLite (sqlite extension ATTACH read-only)"
    not: "Duplicate OHLCV into DuckDB tables; replace SQLite with DuckDB as sole store"
    adr: docs/architecture/adr-0003-storage-repository-contract.md
    reason: "Preserves SQLite WAL single-writer semantics for ingestion; DuckDB adds rich analytical SQL without data duplication."
    added: "2026-06-12"

  - purpose: llm_client
    status: active
    api: "openai SDK 1.62.0 in OpenAI-compatible mode (single DeepSeekStrategist)"
    not: "Per-module LLM clients; langchain; direct HTTP"
    adr: docs/architecture/adr-0005-llm-client-strategy.md
    reason: "One client surface; provider/model/base_url switchable via models_config.json or DEEPSEEK_* env (no source edit). DeepSeek, DeepSeek Reasoner, local LM Studio all supported."
    added: "2026-06-12"

  - purpose: kimi_coding_v1_baseline
    status: active
    api: "Kimi Coding chat endpoint https://api.kimi.com/coding/v1 via openai SDK default_headers User-Agent"
    not: "Treat Kimi Coding as a Files API provider; claim Kimi-side file context is available with sk-kimi-* keys"
    adr: docs/architecture/adr-0023-kimi-coding-endpoint.md
    reason: "The v1 live Kimi baseline is chat-centered: Research Agent runs, report generation, function calling, thinking mode, and model routing. Kimi /files stays local-fallback or future split-client work."
    added: "2026-06-25"

  - purpose: cors_policy
    status: active
    api: "allow_origins=['*'], allow_methods=['*'], allow_headers=['*']"
    not: "Tight origin allowlist (today)"
    adr: docs/architecture/adr-0007-api-surface-and-cors.md
    reason: "Safe ONLY because FastAPI binds 127.0.0.1. Hardening target: explicit localhost origins once non-loopback bind is contemplated."
    referenced_by:
      - docs/architecture/adr-0008-web-architecture.md
    added: "2026-06-12"

  - purpose: market_data_source
    status: active
    api: "TDX (opentdx protocol, primary) + yfinance 0.2.66 (secondary/fallback), both via IMarketDataSource adapter"
    not: "Direct yfinance.download in modules (legacy macro/data_loader.py drift)"
    adr: docs/architecture/adr-0004-data-source-adapter-contract.md
    reason: "Shared retry/backoff, canonical 8-col frame, offline-tolerant (return None, never crash)."
    added: "2026-06-12"

  - purpose: web_stack
    status: active
    api: "Vue 3.5 + Vite 8 + Pinia 3 + Naive UI 2.44 + lightweight-charts v5 + manual-fetch SSE (NOT EventSource)"
    not: "React; EventSource (endpoint is POST)"
    adr: docs/architecture/adr-0008-web-architecture.md
    reason: "Composition API + virtual scroll + manual SSE for POST scan endpoint."
    added: "2026-06-12"

  - purpose: config_centralization
    status: active
    api: "frozen dataclass Settings in src/doge/config/settings.py + get_settings() lazy singleton"
    not: "pydantic-settings / dynaconf; per-module root recalculation; YAML/TOML config file as primary"
    adr: docs/architecture/adr-0002-centralized-configuration.md
    reason: "Stdlib-only for the Foundation layer; env-var override is the operator contract; frozen=True prevents mid-process mutation."
    added: "2026-06-12"

  - purpose: sse_reader
    status: active
    api: "raw fetch + ReadableStream reader (web console)"
    not: EventSource
    adr: docs/architecture/adr-0008-web-architecture.md
    reason: "Scan endpoint is POST /api/scan/{market}; EventSource only supports GET. progress===-1 error, >=100 complete."
    added: "2026-06-12"

  - purpose: platform_shell_routing
    status: active
    api: "Vue Router feature-flagged platform shell; preserve direct /research-agent route"
    not: "Immediate replacement of /research-agent"
    adr: docs/architecture/adr-0020-platform-shell-ui.md
    reason: "Platform workflows need shared navigation and context while existing agent route compatibility remains required."
    added: "2026-06-22"

  - purpose: run_summary_discovery
    status: active
    api: "FastAPI /v1/runs/{run_id}/{summary,claims,citations,eval}"
    not: "Client-only reconstruction from event/artifact arrays as the authoritative contract"
    adr: docs/architecture/adr-0017-run-summary-citation-api.md
    reason: "Server-side summaries preserve ACL checks, local evidence provenance, and SDK/UI parity."
    added: "2026-06-22"

  - purpose: capability_discovery
    status: active
    api: "FastAPI /v1/capabilities via redacted registry facade"
    not: "Frontend environment flags as the only capability source"
    adr: docs/architecture/adr-0019-capability-registry.md
    reason: "Workflows and shell routes need provider/tool/evidence/maturity blockers from one safe source."
    added: "2026-06-22"

  - purpose: single_stack_runtime_direction
    status: active
    api: "process roots + persisted runtime + /v1 routes + SDK clients"
    not: "New platform features under legacy /api/*, doge.application.composition, in-memory runtime, or PyQt-only paths"
    adr: docs/architecture/adr-0024-single-stack-runtime-direction.md
    reason: "Prevents permanent dual architecture while preserving local compatibility and demo surfaces through explicit deprecation gates."
    added: "2026-06-25"

  - purpose: slot_platform_default_posture
    status: active
    api: "workflow_templates, slot_platform, slot_governance, slot_watcher, and slot_loader default on; slot_install, slot_enforcement, slot_ui, slot_provider_execution, python_analysis_enabled, slot_code_string_isolation, and Web install UI default off"
    not: "Default bundle activation, marketplace install, URL/upload install, OS/container/WASM sandboxing, YAML manifests, default-on provider execution, provider contribution isolation, transitive dependency signing, or production-ready plugin runtime"
    adr: docs/architecture/adr-0067-slot-install-surfaces.md
    reason: "ADR-0060 supersedes ADR-0058 for slot_loader only; ADR-0064 adds default-off installed-provider execution; ADR-0065 requires package-aware v3 signatures before provider import; ADR-0066 adds a separate default-off code-string isolation prototype; ADR-0067 adds default-off HTTP/SDK/Web local install surfaces without changing production posture."
    added: "2026-07-08"

  - purpose: slot_provider_execution_gate
    status: active
    api: "installed local slot provider entrypoint execution through bootstrap InstalledProviderSlot when P5 gates and ADR-0065 package-aware v3 signature gates pass; ADR-0068 allows eval_suites, ADR-0069 allows static ui_panels metadata, and ADR-0070 allows slot-scoped watchers"
    not: "SlotLoader provider imports, non-installed manifest-dir execution, restricted gateway/governance facets, OS sandboxing, malicious-code containment, transitive dependency signing, marketplace install, or production plugin runtime"
    adr: docs/architecture/adr-0070-slot-watcher-provider-facet.md
    reason: "Provider execution needs bootstrap-owned settings, trusted publisher keys, revocation repository, runtime interception, package-aware v3 signature verification, path-confined installed-package import, and admission checks; ADR-0068/0069/0070 move only eval_suites, static ui_panels metadata, and slot-scoped watchers out of the restricted facet list."
    added: "2026-07-08"

  - purpose: tool_slot_domain_ownership
    status: active
    api: "Built-in tool descriptors are grouped by slot id: market.core, portfolio.core, evidence.core, quant.lab, governance.actions, and compliance.screening"
    not: "Moving provider implementations into slot modules, adding new feature flags, changing /v1/tools descriptors, or slotting high-risk Python execution"
    adr: docs/architecture/adr-0059-tool-slot-domain-migration.md
    reason: "Domain-level tool slot ownership improves discovery and later governance/enforcement seams while preserving ToolApplicationService parity."
    added: "2026-07-08"

  - purpose: slot_center_persistent_activation
    status: active
    api: "SQLite-backed single active bundle record plus POST /v1/slot-bundles/{bundle_id}/activate, POST /v1/slot-bundles/active/deactivate, CLI, and Web Slot Center controls"
    not: "Auto-activating bundles, per-slot persistent enablement, enterprise bundle ACL beyond ADR-0061's HTTP activate/deactivate gate, provider execution, sandboxing, YAML manifests, URL/upload install, or marketplace behavior"
    adr: docs/architecture/adr-0060-persistent-slot-bundle-activation.md
    reason: "P2 turns Slot Center from read-only local preview into a durable local alpha control surface while preserving the manifest-only safety boundary."
    added: "2026-07-08"

  - purpose: slot_bundle_enterprise_acl
    status: active
    api: "Enterprise-mode HTTP slot-bundle activate/deactivate requires enterprise_acl_grants with resource_type=slot_bundle and permission=write"
    not: "CLI ACL checks, local-demo behavior changes, deny-audit events, schema migration, install allowlist expansion, provider execution, sandboxing, YAML manifests, URL/upload install, or marketplace behavior"
    adr: docs/architecture/adr-0061-enterprise-bundle-acl.md
    reason: "P2.5 closes the enterprise HTTP authorization gap left by ADR-0060 while keeping CLI as a local-operator trust path and preserving the local alpha posture."
    added: "2026-07-08"

  - purpose: slot_cryptographic_signing
    status: active
    api: "Ed25519 v2 manifest-only and v3 package-aware slot.signature.json verification, trusted publisher keys, SQLite key revocation with successor metadata, and CLI sign/revoke-key"
    not: "Provider entrypoint execution by v2 signing alone, remote key distribution, sandboxing, YAML manifests, URL/upload install, marketplace behavior, or default-on install"
    adr: docs/architecture/adr-0065-provider-package-identity.md
    reason: "P3 releases the no-cryptographic-manifest-signing invariant; ADR-0065 extends it with v3 package-aware signatures required by installed provider execution."
    added: "2026-07-08"

  - purpose: slot_provider_package_identity
    status: active
    api: "v3 slot.signature.json binds canonical SlotManifest JSON plus sha256_tree_v1 provider package digest; installed provider import is path-confined to the signed package directory"
    not: "v2 manifest-only execution eligibility, transitive dependency signing, filesystem mediation, malicious-code containment, OS/container/WASM sandboxing, Sigstore/cosign, marketplace behavior, YAML manifests, or URL/upload install"
    adr: docs/architecture/adr-0065-provider-package-identity.md
    reason: "P7 closes the signed-manifest-to-swapped-code gap while preserving local alpha and default-off execution posture."
    added: "2026-07-08"

  - purpose: slot_runtime_interception
    status: active
    api: "Default-off in-process slot runtime guards for db/secret/network ports plus Python subprocess env/cwd hardening"
    not: "Filesystem mediation, OS/container/WASM sandboxing, malicious-code containment, third-party provider execution, marketplace behavior, or production-ready plugin runtime"
    adr: docs/architecture/adr-0063-slot-runtime-permission-interception.md
    reason: "P4 releases only the guarded-port runtime interception and subprocess hardening subset while keeping provider execution and true sandboxing deferred."
    added: "2026-07-08"

  - purpose: slot_code_string_isolation
    status: active
    api: "Default-off DOGE_FEATURE_SLOT_CODE_STRING_ISOLATION applies Windows Job Object resource limits to run_python_analysis code strings only after Python analysis subprocess execution is explicitly enabled"
    not: "Provider contribution-object isolation, filesystem mediation, raw network denial, malicious-code containment, POSIX hardened sandboxing, marketplace behavior, or production plugin runtime"
    adr: docs/architecture/adr-0066-code-string-isolation-prototype.md
    reason: "P8 can isolate the string-in/primitive-out ICodeExecutor path but cannot move live provider contribution objects out of process without a separate provider-runner protocol."
    added: "2026-07-08"

  - purpose: slot_install_surfaces
    status: active
    api: "Default-off local slot install through CLI, POST /v1/slots/install, Python SDK, TypeScript SDK, and Web Slot Center install modal"
    not: "URL install, upload install, YAML manifests, marketplace/catalog behavior, client-side provider import, default-on provider execution, OS/container/WASM sandboxing, or production plugin runtime"
    adr: docs/architecture/adr-0067-slot-install-surfaces.md
    reason: "P9 releases the no-HTTP/no-SDK install deferrals while preserving server-side local install policy, enterprise slot ACL, allowlist/signature gates, audit, rollback-safe staging, and default-off posture."
    added: "2026-07-09"

  - purpose: slot_eval_suite_provider_facet
    status: active
    api: "Installed, package-signed, operator-gated eval providers may contribute eval_suites through SlotKernel and EvalSuiteRegistry"
    not: "Gateway route, watcher, or governance policy provider facets; marketplace install; YAML manifests; URL/upload install; provider sandboxing; production plugin runtime"
    adr: docs/architecture/adr-0068-slot-eval-suite-provider-facet.md
    reason: "P10 opens the lowest-risk restricted facet first because eval suite contributions are declarative records consumed by the existing offline eval registry."
    added: "2026-07-09"

  - purpose: slot_ui_panel_provider_facet
    status: active
    api: "Installed, package-signed, operator-gated UI providers may contribute static ui_panels metadata through SlotKernel and UIPanelRegistry"
    not: "Dynamic frontend component loading, gateway route facets, governance policy facets, marketplace install, YAML manifests, URL/upload install, provider sandboxing, or production plugin runtime"
    adr: docs/architecture/adr-0069-slot-ui-panel-provider-facet.md
    reason: "P10 opens UI panels only as backend metadata; web/src/views/panelRegistry.ts remains the static allowlist for rendering."
    added: "2026-07-09"

  - purpose: slot_watcher_provider_facet
    status: active
    api: "Installed, package-signed, operator-gated watcher providers may contribute slot-scoped runtime event watchers through SlotKernel and RuntimeEventWatcherMiddleware"
    not: "Gateway route facets, governance policy facets, marketplace install, YAML manifests, URL/upload install, provider sandboxing, or production plugin runtime"
    adr: docs/architecture/adr-0070-slot-watcher-provider-facet.md
    reason: "P10 opens watchers only after preserving fail-closed watcher behavior and wrapping provider watcher callables in slot permission context."
    added: "2026-07-09"

# ============================================================================
# PERFORMANCE BUDGETS
# ============================================================================
performance_budgets:
  - budget: mcp_tool_latency
    target: "< 30s per tool call"
    platform: local
    adr: docs/architecture/adr-0006-mcp-transport-strategy.md
    enforced_by: "_timed decorator (asyncio.wait_for, TOOL_TIMEOUT=30); on timeout returns 'Error: {tool} timed out after 30s'"
    notes: "Matches standards/technical-preferences.md MCP Tool Latency budget."
    added: "2026-06-12"

  - budget: api_route_latency
    target: "no operator-perceived regression vs direct-DB baseline"
    platform: local
    adr: docs/architecture/adr-0007-api-surface-and-cors.md
    notes: "Read routes open fresh sqlite3 connection per handler today (no pooling). Target: repository-routed, WAL-enabled."
    added: "2026-06-12"

  - budget: duckdb_analytical_reads
    target: "zero-copy reads over SQLite; memory bounded by result set"
    platform: local
    adr: docs/architecture/adr-0003-storage-repository-contract.md
    enforced_by: "DuckDBConnection read_only=True; threads=4; OPENBLAS_NUM_THREADS=1 / OMP_NUM_THREADS=1 to bound pandas conversion memory"
    added: "2026-06-12"

  - budget: ui_responsiveness
    target: "long-running scans/macro/LLM runs never freeze the UI thread"
    platform: "local desktop (PyQt) + browser (Vue)"
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    enforced_by: "PyQt QThread workers + Qt signals; Vue web worker + SSE stream; scan auto-locks DB editor tab"
    added: "2026-06-12"

  - budget: memory_ceiling
    target: "bounded by dataset size; avoid full-history UI loads"
    platform: local
    adr: docs/architecture/adr-0001-brownfield-clean-architecture.md
    enforced_by: "120-day fetch default per ticker; virtual scroll (viewport + buffer rows only); DuckDB view result sets"
    added: "2026-06-12"

