name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    env:
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python package
        run: python -m pip install -e .

      - name: Run pytest
        run: python -m pytest -q

      - name: Check SDK contract drift
        run: python tools/ci/sdk-contract-check.py

      - name: Validate documentation
        run: |
          python scripts/validate_docs_links.py
          python scripts/validate_no_stale_counts.py
          python scripts/generate_docs_status.py --check

      - name: Run research eval smoke
        run: python -m pytest tests/eval -q

  frontend:
    name: TypeScript checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Test web
        run: npm test
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web

      - name: Test TypeScript SDK
        run: npm test
        working-directory: packages/doge-sdk-typescript

      - name: Build TypeScript SDK
        run: npm run build
        working-directory: packages/doge-sdk-typescript
