# Machine-readable sprint status for MY-DOGE-MICRO.
#
# PURPOSE: Single source of truth for sprint/story state that tooling
# (sprint-status skill, dashboards, CI gates) can parse without reading the
# markdown sprint plan. The markdown plan
# (production/sprints/sprint-002-cdd-followup.md) remains the human-readable
# authority; this file mirrors it for machines.
#
# RULES:
#   - Story IDs are stable: SNNN-NNN (sprint prefix + zero-padded sequence).
#     Never renumber. Add new stories at the end of the active sprint's list.
#   - status values: todo | in_progress | blocked | review | done | deferred
#   - priority values: HIGH | MED | LOW
#   - effort values: S | M | L
#   - tr values must exist and be `active` in docs/architecture/tr-registry.yaml.
#     Use null for governance stories that have no single TR (record the
#   finding/source in `source` instead).
#   - Update this file whenever a story status changes; keep it in lockstep
#     with the markdown sprint plan's story table.
#
# READ BY: /sprint-status, /story-readiness, /story-done, CI sprint-gate jobs.

