[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "doge-sdk"
version = "0.1.0"
description = "Python SDK for OpenDoge daemon gateway"
requires-python = ">=3.10"
dependencies = ["httpx>=0.28.0"]

[tool.setuptools.packages.find]
where = ["."]
